name: AppHost
options:
  minimumXcodeGenVersion: 2.41.0
  deploymentTarget:
    iOS: 16.0
packages:
  privy-ios:
    url: https://github.com/privy-io/privy-ios.git
    branch: main
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 10.20.0
targets:
  AppHost:
    type: application
    platform: iOS
    sources:
      - path: Sources/Wickett
      - path: Resources
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.syndicatemike.AppHost
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        SWIFT_VERSION: 5.7
    dependencies:
      - package: privy-ios
        product: Privy
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseFunctions
schemes:
  AppHost:
    build:
      targets:
        AppHost: all
    run:
      config: Debug



